abstract: |
  This whitepaper documents Baiyuan Technology's engineering practice
  (2024–2026) of building the Baiyuan RAG Knowledge Platform — a
  multi-tenant knowledge retrieval infrastructure shared by three product
  lines: Baiyuan AI Customer Service SaaS, Baiyuan GEO Platform, and
  Baiyuan PIF AI. The book introduces a two-layer retrieval architecture
  (L1 Wiki — DB-cached compiled summaries; L2 RAG — pgvector + BM25 + RRF
  hybrid retrieval), documents deep integration patterns with GEO and PIF,
  and details three-layer tenant isolation, streaming answers, and the
  handoff loop. Published under CC BY-NC 4.0.
